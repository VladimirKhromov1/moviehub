version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: moviehub_development
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis for Sidekiq and caching
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # Rails API Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /app
    environment:
      RAILS_ENV: development
      DATABASE_URL: postgres://postgres:password@db:5432/moviehub_development
      REDIS_URL: redis://redis:6379/0
    volumes:
      - .:/app
      - bundle_cache:/usr/local/bundle
    ports:
      - "3000:3000"
    depends_on:
      - db
      - redis
    command: >
      sh -c "
        bundle install &&
        until pg_isready -h db -p 5432 -U postgres; do sleep 2; done &&
        bundle exec rails db:create db:migrate db:seed &&
        bundle exec rails server -b 0.0.0.0 -p 3000
      "

  # Sidekiq worker for background jobs
  sidekiq:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /app
    environment:
      RAILS_ENV: development
      DATABASE_URL: postgres://postgres:password@db:5432/moviehub_development
      REDIS_URL: redis://redis:6379/0
    volumes:
      - .:/app
      - bundle_cache:/usr/local/bundle
    depends_on:
      - db
      - redis
    command: bundle exec sidekiq

  # Vue.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      VITE_API_URL: http://localhost:3000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  bundle_cache:
